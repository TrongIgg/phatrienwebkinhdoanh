<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Bang mau chinh cua THO Studio</title>
  <desc id="desc">Cac the mau chu dao du kien su dung trong giao dien THO Studio.</desc>
  <rect width="1180" height="520" fill="#F8F1EA"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#361F17">THO Studio - Bang mau UI du kien</text>
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="18" fill="#6E5A4C">Lay cam hung tu dat set, gom nung, men celadon va khong gian xuong thu cong.</text>

  <g transform="translate(60 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#361F17"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Nau dat</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#F8F1EA">#361F17</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#EADCCF">Text chinh</text>
  </g>

  <g transform="translate(230 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#643A2A"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Gom nung</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#F8F1EA">#643A2A</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#EADCCF">Nhan dien</text>
  </g>

  <g transform="translate(400 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#C96B37"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Dat nung</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#FFF7EF">#C96B37</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#FFF1E4">Canh bao/CTA</text>
  </g>

  <g transform="translate(570 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#716942"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Olive</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#F8F1EA">#716942</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#EDE8D4">Trang thai tot</text>
  </g>

  <g transform="translate(740 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#FBEEE5" stroke="#D7C5B7" stroke-width="2"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#361F17">Dat set bot</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#643A2A">#FBEEE5</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#6E5A4C">Nen trang</text>
  </g>

  <g transform="translate(910 150)">
    <rect x="0" y="0" width="170" height="250" rx="14" fill="#F5F1ED" stroke="#D7C5B7" stroke-width="2"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#361F17">Kem sang</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="18" fill="#643A2A">#F5F1ED</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="14" fill="#6E5A4C">Surface</text>
  </g>

  <rect x="60" y="430" width="1020" height="34" rx="17" fill="#3F3F35"/>
  <text x="82" y="453" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Nguyen tac su dung: nen am - chu dam - CTA dat nung - trang thai hoan thanh olive - dashboard dung xam dam de tang do ro.</text>
</svg>
