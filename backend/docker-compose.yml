services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tho_backend_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tho_platform
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: tho_backend_db
    environment:
      POSTGRES_DB: tho_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed_phase2.sql:/docker-entrypoint-initdb.d/02_seed_phase2.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tho_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
